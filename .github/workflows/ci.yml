# Runs on pushes to main, every update to any PR, and is reused by the release publish workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path native/Cargo.toml
      - name: runjucks_core async feature tests
        run: cargo test --manifest-path native/Cargo.toml -p runjucks_core --features async

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm run check:conformance-allowlist
      - run: npm test
      - run: npm run test:upstream
