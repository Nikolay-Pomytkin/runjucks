# Builds Starlight + TypeDoc and deploys to GitHub Pages (project site).
# Set repository Settings → Pages → Source: GitHub Actions.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'index.d.ts'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: docs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install
        run: npm ci
      - name: Build site and API reference
        run: npm run build
        env:
          # Project site: https://<owner>.github.io/<repo>/
          ASTRO_SITE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          ASTRO_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
